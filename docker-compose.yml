services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: embroidery-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./volumes/thumbnails:/app/thumbnails
      - ./volumes/logos:/app/logos
      - ./volumes/data:/app/data
    networks:
      - embroidery-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: embroidery-frontend
    ports:
      - "5174:5173"
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://192.168.111.208:8001
    depends_on:
      - backend
    networks:
      - embroidery-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: embroidery-ollama
    volumes:
      - ./volumes/ollama-data:/root/.ollama
    networks:
      - embroidery-network

networks:
  embroidery-network:
    driver: bridge
