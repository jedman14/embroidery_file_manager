services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embroidery-app
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      # Single volume: app uses /app/data/thumbnails, /app/data/logos, /app/data/*.json
      - ./volumes/app:/app/data
    networks:
      - embroidery-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: embroidery-ollama
    volumes:
      - ./volumes/ollama-data:/root/.ollama
    networks:
      - embroidery-network

networks:
  embroidery-network:
    driver: bridge
